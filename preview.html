<!DOCTYPE html>
<html>
<head>
<style>
  body { display: flex; gap: 60px; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; font-family: sans-serif; }
  .box { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  label { font-size: 14px; color: #666; }
  .sun { width: 260px; height: 260px; background: #F97316; border-radius: 28%; display: flex; align-items: center; justify-content: center; }
  .inner { background: #EAB308; border-radius: 28%; display: flex; align-items: flex-start; justify-content: flex-end; padding: 10%; box-sizing: border-box; }
  .dot { background: #FEF9E7; border-radius: 28%; flex-shrink: 0; }
  .current .inner { width: 69%; height: 69%; }
  .current .dot   { width: 14%; height: 14%; }
  .proposed .inner { width: 60%; height: 60%; }
  .proposed .dot   { width: 14%; height: 14%; }
</style>
</head>
<body>
  <div class="box">
    <div class="sun current"><div class="inner"><div class="dot"></div></div></div>
    <label>Actuel (69%)</label>
  </div>
  <div class="box">
    <div class="sun proposed"><div class="inner"><div class="dot"></div></div></div>
    <label>Proposé (60%)</label>
  </div>
</body>
</html>
