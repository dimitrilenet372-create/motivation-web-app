<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Perfect Day</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── SPLASH ── -->
  <div id="splash" class="screen active">
    <div class="splash-sun">
      <div class="splash-inner"><div class="splash-dot"></div></div>
    </div>
  </div>

  <!-- ── ONBOARDING ── -->
  <div id="onboarding" class="screen">
    <div class="ob-wrap">
      <div class="ob-logo">
        <div class="mini-sun"><div class="mini-inner"><div class="mini-dot"></div></div></div>
        <span>Perfect day</span>
      </div>
      <h1 class="ob-title">What did you<br>want to track?</h1>
      <p class="ob-sub">Choose some challenges</p>
      <div class="cat-grid" id="cat-grid"></div>
      <div class="ob-name-row">
        <input type="text" id="ob-name" class="app-input" placeholder="Ton prénom"/>
      </div>
      <button class="btn-dark-full" id="ob-next" disabled>Commencer →</button>
    </div>
  </div>

  <!-- ── APP ── -->
  <div id="app" class="screen">

    <!-- HOME TAB -->
    <div id="tab-home" class="tab active">
      <div class="app-scroll">
        <div class="home-header">
          <div class="user-pill" id="user-pill">
            <div class="user-avatar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            </div>
            <div>
              <div class="user-hello">Hello</div>
              <div class="user-name" id="user-name-display">—</div>
            </div>
          </div>
        </div>
        <div class="week-strip" id="week-strip"></div>
        <div class="section">
          <div class="section-row">
            <h2 class="section-title">Goals</h2>
            <button class="add-icon-btn" id="add-goal-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <div id="goals-list"></div>
        </div>
        <div class="section">
          <h2 class="section-title">Your challenge of the day</h2>
          <div id="challenges-home-list"></div>
        </div>
        <div style="height:90px"></div>
      </div>
    </div>

    <!-- ADD TAB -->
    <div id="tab-add" class="tab">
      <div class="app-scroll">
        <div class="add-header">
          <h2 class="page-title">Add a challenge</h2>
        </div>
        <div class="cat-grid" id="add-cat-grid"></div>
        <div id="add-form" class="add-form hidden">
          <h3 class="form-label">Name your challenge</h3>
          <input type="text" id="new-name" class="app-input" placeholder="Ex: Méditation"/>
          <h3 class="form-label">Target days</h3>
          <div class="counter-row">
            <button class="counter-btn" id="t-minus">−</button>
            <span class="counter-val" id="t-val">365</span>
            <button class="counter-btn" id="t-plus">+</button>
          </div>
          <button class="btn-orange-full" id="save-challenge">Add challenge</button>
        </div>
        <div style="height:90px"></div>
      </div>
    </div>

    <!-- CHALLENGES TAB -->
    <div id="tab-challenges" class="tab">
      <div class="app-scroll">
        <div class="add-header">
          <h2 class="page-title">Challenge of the day</h2>
        </div>
        <div id="all-challenges-list"></div>
        <div style="height:90px"></div>
      </div>
    </div>

    <!-- TRACKING TAB -->
    <div id="tab-tracking" class="tab">
      <div class="app-scroll">
        <div class="add-header">
          <h2 class="page-title">Tracking</h2>
        </div>
        <div id="tracking-list"></div>
        <div style="height:90px"></div>
      </div>
    </div>

    <!-- PROFILE TAB -->
    <div id="tab-profile" class="tab">
      <div class="app-scroll">
        <div class="profile-wrap">
          <div class="profile-avatar-big">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          </div>
          <div class="profile-name" id="profile-name-display">—</div>
          <div class="profile-stats" id="profile-stats"></div>
          <div class="profile-actions">
            <button class="btn-outline-sm" id="edit-name-btn">Modifier le prénom</button>
            <button class="btn-danger-sm" id="reset-btn">Réinitialiser</button>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="tab-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-tab="tab-add">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span>Add</span>
      </button>
      <button class="nav-btn" data-tab="tab-challenges">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Challenge</span>
      </button>
      <button class="nav-btn" data-tab="tab-tracking">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Tracking</span>
      </button>
      <button class="nav-btn" data-tab="tab-profile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </button>
    </nav>
  </div>

  <!-- GOAL MODAL -->
  <div id="goal-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Add a goal</h3>
      <div class="cat-grid small" id="goal-cat-grid"></div>
      <input type="text" id="goal-name" class="app-input" placeholder="Nom du goal"/>
      <div class="counter-row">
        <button class="counter-btn" id="g-minus">−</button>
        <span class="counter-val" id="g-val">365</span>
        <button class="counter-btn" id="g-plus">+</button>
      </div>
      <button class="btn-orange-full" id="save-goal">Ajouter le goal</button>
      <button class="btn-ghost" id="close-modal">Annuler</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
